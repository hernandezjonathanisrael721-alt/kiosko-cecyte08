<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CECyTE Tlaxcala</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#ff7b00,#1f8f3a,#666);
    color:white;
}

header{
    background:rgba(0,0,0,0.25);
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.logo{
    width:200px;
    background:white;
    border-radius:15px;
    padding:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

h1{
    margin-top:15px;
    font-size:35px;
}

.container{
    margin-top:40px;
}

input{
    width:260px;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:20px;
    text-align:center;
}

button{
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    background:#444;
    color:white;
    transition:0.3s;
}

button:hover{
    background:#222;
    transform:scale(1.05);
}

#resultado{
    margin-top:30px;
}

#resultado img{
    width:90%;
    max-width:900px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<header>

<img src="logo_cecyte.png" class="logo">

<h1>CECyTE Tlaxcala</h1>

<p>Sistema Digital de Consulta de Horarios</p>

</header>

<div class="container">

<input type="text" id="grupo" placeholder="Ejemplo: 2A">

<br>

<button onclick="buscarHorario()">
Consultar horario
</button>

<button onclick="verMapa()">
Ver mapa de la escuela
</button>

<div id="resultado"></div>

</div>

<script>

// HORARIOS
const horarios = {

    // SEGUNDOS
    "2A":"horario_2A.png",
    "2B":"horario_2B.png",
    "2C":"horario_2C.png",
    "2D":"horario_2D.png",
    "2E":"horario_2E.png",
    "2F":"horario_2F.png",
    "2G":"horario_2G.png",

    // CUARTOS
    "4A":"horario_4A.png",
    "4B":"horario_4B.png",
    "4C":"horario_4C.png",
    "4D":"horario_4D.png",
    "4E":"horario_4E.png",
    "4F":"horario_4F.png",
    "4G":"horario_4G.png",

    // SEXTOS
    "6A":"horario_6A.png",
    "6B":"horario_6B.png",
    "6C":"horario_6C.png",
    "6D":"horario_6D.png",
    "6E":"horario_6E.png",
    "6F":"horario_6F.png",
    "6G":"horario_6g.png"

};

// BUSCAR HORARIO
function buscarHorario(){

    let grupo = document
    .getElementById("grupo")
    .value
    .toUpperCase();

    let resultado =
    document.getElementById("resultado");

    if(horarios[grupo]){

        resultado.innerHTML =

        `<h2>Horario ${grupo}</h2>

        <img src="${horarios[grupo]}">`;

    }else{

        resultado.innerHTML =

        `<h2>Grupo no encontrado</h2>`;

    }

}

// VER MAPA
function verMapa(){

    document.getElementById("resultado")
    .innerHTML =

    `<h2>Mapa de la escuela</h2>

    <img src="mapa_cecyte.png">`;

}

</script>

</body>
</html>
